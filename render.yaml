services:
  # Backend API
  - type: web
    name: gamematch-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://gamematch-app.onrender.com  # update after frontend deploys

  # Frontend
  - type: web
    name: gamematch-app
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build:prod
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://gamematch-api.onrender.com  # update after backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
